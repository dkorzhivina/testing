<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Card</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="#" class="logo">MyStore</a>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <article class="card">
                <div class="card_barge">NEW</div>
                
                <div class="card_icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor">
                        <circle cx="12" cy="12" r="10"/>
                    </svg>
                </div>

        <h2 class="card_title">Nike Air Force 1</h2>
        <p class="card_price">15000 ₽</p>
        <p class="card_description">
            Минималистичные кроссовки в белом цвете с бежевыми деталями выглядят свежо и современно. 
            Красный акцент придаёт модели характер и делает образ более выразительным.
        </p>

        <div class="card_action">
            <button class="btn btn--primary">Купить сейчас</button>
            <button class="btn btn--secondary">Отложить</button>                    
        </div>
    </article>
    </div>
    </main>
</body>
</html>
